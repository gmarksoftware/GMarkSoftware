<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      background: #05070D;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .logo-container {
      background: white;
      padding: 40px;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
  <div class="logo-container">
    <!-- GramUnnati Interlocking Leaf SVG Logo -->
    <svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Left Hook (Dark Green) -->
      <path d="M 95,45 
               C 70,25 40,45 40,85 
               C 40,125 70,145 100,145 
               C 125,145 140,125 140,105
               L 112,105" 
            stroke="#0F4626" 
            stroke-width="24" 
            stroke-linecap="round" 
            stroke-linejoin="round" />

      <!-- Right Hook (Lime Green) -->
      <path d="M 105,45 
               C 130,25 160,45 160,85 
               C 160,125 130,145 100,145 
               C 75,145 60,125 60,105
               L 88,105" 
            stroke="#9CCC3C" 
            stroke-width="24" 
            stroke-linecap="round" 
            stroke-linejoin="round" />
    </svg>
  </div>
</body>
</html>
