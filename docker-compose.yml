version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: gmark-postgres-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: gmark
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gmark-backend-api
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/gmark?schema=public
      - JWT_SECRET=development_secret_key_change_in_production
      - RESEND_API_KEY=
      - CONTACT_RECEIVER_EMAIL=
      - CONTACT_SENDER_EMAIL=G Mark Admin <onboarding@resend.dev>
      - EMAILJS_SERVICE_ID=
      - EMAILJS_TEMPLATE_ID=
      - EMAILJS_PUBLIC_KEY=
      - EMAILJS_PRIVATE_KEY=
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5000/api
        - VITE_EMAILJS_SERVICE_ID=service_dl9lt8m
        - VITE_EMAILJS_TEMPLATE_ID=template_85q9wsn
        - VITE_EMAILJS_PUBLIC_KEY=gHbdcmb4NBh60Hg4n
    container_name: gmark-frontend-web
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
